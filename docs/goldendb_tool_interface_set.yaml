version: 1
service:
  name: ZXCLOUD GoldenDB Insight OpenAPI
  source_document: ZXCLOUDGoldenDB分布式数据库通用rest接口操作指南.txt
  auth:
    type: header
    headers:
      username:
        required: true
        type: string
        description: Insight 登录用户名
      password:
        required: true
        type: string
        encoding: base64
        description: Insight 登录密码，需 base64 编码
  common_response:
    code:
      type: integer
      semantics:
        1: success
        2: failed
        -1: auth_failed
    msg:
      type: string
      description: 结果描述
    data:
      type: any
      description: 具体业务结果
    duration:
      type: string
      description: 接口耗时，通常为毫秒
    operationId:
      type: string
      description: 请求操作 ID

abstraction:
  purpose:
    - 将 GoldenDB Insight REST 文档抽象成可复用工具接口集
    - 区分元数据发现、业务执行、异步任务查询三类能力
    - 后续优先通过接口目录动态发现参数，再调用具体业务接口
  recommended_layers:
    - interface_catalog
    - business_tools
    - async_task_tracking
  generic_tools:
    - name: catalog_list_tree
      based_on: "2.1"
      description: 获取所有可见接口树，用于枚举能力域
    - name: catalog_get_detail
      based_on: "2.2"
      description: 按节点 ID、名称或 URL 获取接口详情，包括请求示例和字段说明
    - name: catalog_update_version
      based_on: "2.3"
      description: 切换指定接口默认版本
    - name: api_invoke
      description: 通用调用器，先通过 catalog_get_detail 获取元数据，再按 method/path 发起调用
    - name: task_query
      description: 异步任务统一查询入口模式，输入 taskId，调用对应 query 类接口

common_parameters:
  - {name: taskId, type: string, description: 异步任务 ID，用于查询进度或结果}
  - {name: clusterId, type: string, description: 集群/租户实例 ID}
  - {name: roomId, type: string, description: AZ 或机房 ID}
  - {name: ip, type: string, description: 主机 IP，部分接口支持逗号分隔和区间表达}
  - {name: pageNum, type: integer, description: 页码}
  - {name: pageSize, type: integer, description: 每页大小}

tool_groups:
  - group: interface_catalog
    section: "2"
    tools:
      - {name: rest_tree_list, section: "2.1", method: GET, path: "/open_api/insight/container/rest/tree", summary: "查询接口平面树"}
      - {name: rest_info_get, section: "2.2", method: GET, path: "/open_api/insight/container/rest/info", summary: "查询接口平面详细信息"}
      - {name: rest_version_update, section: "2.3", method: POST, path: "/open_api/insight/container/rest/update/version", summary: "更新接口默认版本"}

  - group: host_management
    section: "3"
    tools:
      - {name: host_batch_add_json, section: "3.1.1", method: POST, path: "/open_api/insight/external/host/batchAddhost", summary: "JSON 方式纳管主机", returns_task: true}
      - {name: host_batch_add_excel, section: "3.1.2", method: POST, path: "/open_api/insight/external/host/batchAddhostExcel", summary: "Excel 方式纳管主机", returns_task: true}
      - {name: host_batch_add_progress, section: "3.2", method: GET, path: "/open_api/insight/external/host/querybatchAddHostResult", summary: "查询纳管主机进度", query: ["taskId"]}
      - {name: host_query, section: "3.3", method: GET, path: "/open_api/insight/external/host/queryHost", summary: "查询主机服务器信息"}

  - group: parameter_template
    section: "4"
    tools:
      - {name: template_sync, section: "4.1", method: POST, path: "/open_api/insight/external/syncTemplate", summary: "同步参数模板"}
      - {name: template_sync_new, section: "4.2", method: POST, path: "/open_api/insight/external/syncTemplate_new", summary: "同步参数模板（新）"}
      - {name: component_param_modify, section: "4.3", method: POST, path: "/open_api/insight/external/paramconfig/modifyParamConfig", summary: "修改组件配置参数"}
      - {name: cluster_param_modify_new, section: "4.4", method: POST, path: "/open_api/insight/external/param/clusterParamConfigIssue", summary: "修改参数（新）", returns_task: true}
      - {name: component_param_query, section: "4.5", method: POST, path: "/open_api/insight/external/param/queryParam", summary: "查询组件参数"}
